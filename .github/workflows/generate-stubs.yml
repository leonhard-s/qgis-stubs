name: Generate type stubs

on:
  workflow_dispatch:
    inputs:
      qgis_image:
        description: "QGIS Docker image (e.g. qgis/qgis:3.44-questing)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  GIT_USER: GitHub Actions
  GIT_EMAIL: action@github.com

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "${{ env.GIT_USER }}"
          git config user.email "${{ env.GIT_EMAIL }}"

      - name: Extract Python modules from QGIS image
        run: |
          docker run --rm ${{ inputs.qgis_image }} tar -C /usr/lib/python3/dist-packages -czf - qgis | tar -xzf -

      - name: Delete .so files
        run: find qgis -name "*.so" -delete

      - name: Delete .yaml files
        run: find qgis -name "*.yaml" -delete

      - name: Delete __pycache__ directories
        run: find qgis -type d -name "__pycache__" -exec rm -rf {} +

      - name: Create branch, replace qgis-stubs, commit and push
        run: |
          IMAGE_TAG="${{ inputs.qgis_image }}"
          TAG="${IMAGE_TAG##*:}"
          BRANCH="stubgen/${TAG}-${{ github.run_id }}"
          git checkout -b "${BRANCH}"
          rm -rf qgis-stubs/
          mv qgis/ qgis-stubs/
          git add -A
          git commit -m "Update stubs from ${{ inputs.qgis_image }}"
          git push -u origin "${BRANCH}"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --draft \
            --base main \
            --title "Update stubs: ${{ inputs.qgis_image }}" \
            --body "Automated stub extraction from \`${{ inputs.qgis_image }}\`. Manual review and cleanup required before merging." \
            --reviewer leonhard-s
